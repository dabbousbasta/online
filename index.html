<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دبوس البسطة</title>
    <!-- أيقونة الصفحة من logo.png -->
    <link rel="icon" type="image/png" sizes="32x32" href="logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }
        /* Content */
        .content {
            height: calc(100vh - 20px);
            text-align: center;
            color: white;
            display: none;
            overflow: auto;
            padding-top: 80px;
        }
        .content.active {
            display: block;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
        .loading {
            padding-top: 120px;
            font-size: 18px;
        }
        #home img {
            max-width: 220px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        #home h1 {
            font-size: 32px;
            margin: 0 0 20px;
        }
        #home p {
            font-size: 16px;
            opacity: 0.95;
            max-width: 90%;
            margin: 0 auto;
        }
        /* Desktop */
        @media (min-width: 800px) {
            body {
                background: #f8f9fa;
                padding: 30px;
            }
            .desktop-tabs {
                display: flex;
                max-width: 1000px;
                margin: 0 auto 30px;
                background: white;
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            }
            .tab-btn {
                flex: 1;
                padding: 22px 18px;
                border: none;
                background: none;
                font-size: 16px;
                font-weight: bold;
                cursor: pointer;
                transition: all 0.3s;
            }
            .tab-btn:hover {
                background: #e9ecef;
            }
            .tab-btn.active {
                background: #667eea;
                color: white;
            }
            .content {
                position: static;
                height: auto;
                max-width: 1000px;
                margin: 0 auto;
                background: white;
                border-radius: 12px;
                box-shadow: 0 6px 20px rgba(0,0,0,0.1);
                min-height: 70vh;
                overflow: visible;
                padding-bottom: 20px;
            }
            iframe {
                height: 750px;
            }
        }
    </style>
</head>
<body>
    <!-- Desktop Tabs فقط -->
    <div class="desktop-tabs">
        <button class="tab-btn" onclick="showTab('search')" ondblclick="openEditPrices()">بحث الأصناف</button>
        <button class="tab-btn" onclick="showTab('prices')" ondblclick="openEditPrices()">أسعار المبيعات</button>
        <button class="tab-btn" onclick="showTab('sales')" ondblclick="openEditPrices()">صندوق دبوس</button>
        <button class="tab-btn" onclick="showTab('review')" ondblclick="openEditPrices()">مراجعة الفواتير</button>
    </div>
    
    <!-- Home -->
    <div class="content active" id="home">
        <img src="logo.png" alt="شعار دبوس البسطة">
        <h1>دبوس البسطة</h1>
        <p>اضغط على التبويبات أعلاه<br>
        <strong>⚡</strong> = دبل كليك لتعديل الأسعار</p>
    </div>
    
    <!-- Pages -->
    <div class="content" id="search">
        <div class="loading">⏳ جاري التحميل...</div>
        <iframe src="https://dabbousbasta.github.io/Dabbous-Al-Basta/"></iframe>
    </div>
    
    <div class="content" id="prices">
        <div class="loading">⏳ جاري التحميل...</div>
        <iframe src="https://dabbousbasta.github.io/ITEM_PRICES/"></iframe>
    </div>
    
    <div class="content" id="sales">
        <div class="loading">⏳ جاري التحميل...</div>
        <iframe src="https://dabbousbasta.github.io/sales/"></iframe>
    </div>
    
    <div class="content" id="review">
        <div class="loading">⏳ جاري التحميل...</div>
        <iframe src="https://dabbousbasta.github.io/Prices/"></iframe>
    </div>

    <script>
        function showTab(tabName) {
            // إخفاء كل المحتوى
            const contents = document.querySelectorAll('.content');
            contents.forEach(content => content.classList.remove('active'));
            
            // إظهار التبويب المختار
            document.getElementById(tabName).classList.add('active');
            
            // إظهار iframe
            if (tabName !== 'home') {
                const targetContent = document.getElementById(tabName);
                const loading = targetContent.querySelector('.loading');
                const iframe = targetContent.querySelector('iframe');
                
                loading.style.display = 'block';
                iframe.style.display = 'none';
                
                setTimeout(() => {
                    loading.style.display = 'none';
                    iframe.style.display = 'block';
                }, 500);
            }
            
            // تحديث الأزرار النشطة
            const allButtons = document.querySelectorAll('.tab-btn');
            allButtons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        function openEditPrices() {
            window.open('https://1drv.ms/x/c/B621496E58CB1141/IQAlsA7JmCA1QKsnIMrD9Z4JAQj_CLoqD--dNjV3ZLoGDYs?e=Zwnxck', '_blank');
        }
    </script>
</body>
</html>
