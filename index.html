<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دبوس البسطة</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            overflow: hidden;
        }
        .menu-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1000;
            background: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.5em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .menu-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        .menu {
            position: fixed;
            top: 70px;
            right: 15px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            min-width: 220px;
            max-height: 60vh;
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: 999;
        }
        .menu.open {
            transform: translateX(0);
        }
        .menu-item {
            padding: 18px 25px;
            border: none;
            background: none;
            width: 100%;
            text-align: right;
            font-size: 1.1em;
            font-weight: bold;
            color: #666;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid #f0f0f0;
        }
        .menu-item:last-child {
            border-bottom: none;
        }
        .menu-item:hover {
            background: #f8f9ff;
            color: #667eea;
            padding-right: 30px;
        }
        .tab-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            padding: 70px 10px 10px;
            overflow: auto;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }
        .tab-pane {
            display: none;
            height: 100%;
        }
        .tab-pane.active {
            display: block;
        }
        .tab-pane.active ~ .tab-content {
            opacity: 1;
            transform: translateY(0);
        }
        .loading {
            text-align: center;
            color: #666;
            font-style: italic;
            padding: 100px 20px;
        }
        iframe {
            width: 100%;
            height: calc(100vh - 120px);
            border: none;
            border-radius: 10px;
            display: none;
        }
        .home-header {
            text-align: center;
            margin: 40px 0;
        }
        .logo {
            width: 160px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        }
        .home-title {
            font-size: 2.2em;
            color: #333;
            margin: 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        .home-desc {
            font-size: 1.2em;
            color: #555;
            margin: 30px auto;
            max-width: 90%;
            line-height: 1.6;
        }
        @media (min-width: 769px) {
            /* Desktop: عرض التبويبات العادية */
            .menu-btn, .menu { display: none; }
            body { padding: 10px; overflow: visible; }
            .tabs {
                display: flex;
                justify-content: center;
                background: white;
                border-radius: 15px 15px 0 0;
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
                margin: 0 auto 0;
                overflow: hidden;
                flex-wrap: wrap;
                max-width: 1000px;
            }
            .tab-btn {
                padding: 15px 25px;
                border: none;
                background: none;
                font-size: 1.1em;
                font-weight: bold;
                color: #666;
                cursor: pointer;
                transition: all 0.3s ease;
                border-bottom: 3px solid transparent;
                white-space: nowrap;
            }
            .tab-btn.active {
                color: #667eea;
                background: #f8f9ff;
                border-bottom-color: #667eea;
            }
            .tab-btn:hover {
                color: #667eea;
                background: #f0f0f0;
            }
            .tab-content {
                position: static;
                padding: 30px;
                min-height: 80vh;
                max-width: 1000px;
                margin: 0 auto;
                border-radius: 0 0 15px 15px;
            }
            iframe { height: 700px; }
        }
    </style>
</head>
<body>
    <!-- زر القائمة للموبايل -->
    <button class="menu-btn" id="menuBtn">☰</button>
    
    <!-- القائمة المنسدلة للموبايل -->
    <nav class="menu" id="menu">
        <button class="menu-item active" data-tab="home">الرئيسية</button>
        <button class="menu-item" data-tab="search">بحث الأصناف</button>
        <button class="menu-item" data-tab="prices">أسعار المبيعات</button>
        <button class="menu-item" data-tab="sales">صندوق دبوس</button>
        <button class="menu-item" data-tab="review">مراجعة الفواتير</button>
    </nav>
    
    <div class="tab-content">
        <!-- الرئيسية -->
        <div id="home" class="tab-pane active">
            <div class="home-header">
                <img src="logo.png" alt="شعار دبوس البسطة" class="logo">
                <h1 class="home-title">دبوس البسطة</h1>
            </div>
            <div class="home-desc">
                اختر أي صفحة من القائمة (☰) في الأعلى لعرضها كاملة الشاشة.
            </div>
        </div>
        
        <!-- باقي الصفحات -->
        <div id="search" class="tab-pane">
            <div class="loading">جاري تحميل الصفحة...</div>
            <iframe src="https://dabbousbasta.github.io/Dabbous-Al-Basta/"></iframe>
        </div>
        <div id="prices" class="tab-pane">
            <div class="loading">جاري تحميل الصفحة...</div>
            <iframe src="https://dabbousbasta.github.io/ITEM_PRICES/"></iframe>
        </div>
        <div id="sales" class="tab-pane">
            <div class="loading">جاري تحميل الصفحة...</div>
            <iframe src="https://dabbousbasta.github.io/sales/"></iframe>
        </div>
        <div id="review" class="tab-pane">
            <div class="loading">جاري تحميل الصفحة...</div>
            <iframe src="https://dabbousbasta.github.io/Prices/"></iframe>
        </div>
    </div>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const menu = document.getElementById('menu');
        const menuItems = document.querySelectorAll('.menu-item');
        const tabPanes = document.querySelectorAll('.tab-pane');
        
        // فتح/إغلاق القائمة
        menuBtn.addEventListener('click', () => {
            menu.classList.toggle('open');
        });
        
        // إغلاق القائمة عند النقر خارجها
        document.addEventListener('click', (e) => {
            if (!menu.contains(e.target) && !menuBtn.contains(e.target)) {
                menu.classList.remove('open');
            }
        });
        
        // تبديل الصفحات
        menuItems.forEach(item => {
            item.addEventListener('click', () => {
                const tabId = item.dataset.tab;
                
                // تحديث النشط
                menuItems.forEach(i => i.classList.remove('active'));
                tabPanes.forEach(p => p.classList.remove('active'));
                item.classList.add('active');
                document.getElementById(tabId).classList.add('active');
                
                // إظهار iframe
                if (tabId !== 'home') {
                    const iframe = document.querySelector(`#${tabId} iframe`);
                    const loading = document.querySelector(`#${tabId} .loading`);
                    setTimeout(() => {
                        loading.style.display = 'none';
                        iframe.style.display = 'block';
                    }, 300);
                }
                
                // إغلاق القائمة
                menu.classList.remove('open');
            });
        });
    </script>
</body>
</html>
