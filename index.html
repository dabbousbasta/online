<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دبوس البسطة</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            height: 100vh;
            overflow: hidden;
        }
        .menu-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1001;
            background: white;
            border: none;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            font-size: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        .menu-btn:hover {
            box-shadow: 0 6px 25px rgba(0,0,0,0.4);
        }
        .menu {
            position: fixed;
            top: 80px;
            right: 15px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 240px;
            max-height: 50vh;
            overflow-y: auto;
            transform: translateX(110%);
            transition: transform 0.3s ease;
            z-index: 1000;
        }
        .menu.show {
            transform: translateX(0);
        }
        .menu-item {
            display: block;
            padding: 20px 25px;
            border: none;
            background: none;
            text-align: right;
            font-size: 16px;
            font-weight: bold;
            color: #555;
            cursor: pointer;
            width: 100%;
            border-bottom: 1px solid #eee;
        }
        .menu-item:last-child {
            border-bottom: none;
        }
        .menu-item:hover {
            background: #e3f2fd;
            color: #1976d2;
        }
        .content {
            position: relative;
            width: 100%;
            height: 100vh;
            padding-top: 70px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .content.show {
            opacity: 1;
        }
        .tab-pane {
            display: none;
            height: 100%;
            padding: 10px;
        }
        .tab-pane.active {
            display: block;
        }
        iframe {
            width: 100%;
            height: calc(100vh - 100px);
            border: none;
            border-radius: 8px;
            display: none;
        }
        .loading {
            text-align: center;
            color: #666;
            font-size: 18px;
            padding-top: 150px;
        }
        .home-content {
            text-align: center;
            padding: 50px 20px;
            color: white;
        }
        .logo {
            width: 140px;
            height: auto;
            margin: 0 auto 20px;
            display: block;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .home-title {
            font-size: 28px;
            margin: 0 0 15px;
        }
        .home-text {
            font-size: 16px;
            margin: 0;
            opacity: 0.9;
        }
        
        /* Desktop */
        @media (min-width: 769px) {
            .menu-btn, .menu { display: none !important; }
            body { overflow: auto; background: #f5f5f5; padding: 20px; height: auto; }
            .tabs {
                display: flex;
                justify-content: center;
                background: white;
                border-radius: 12px;
                box-shadow: 0 5px 20px rgba(0,0,0,0.15);
                margin: 0 auto 20px;
                max-width: 900px;
                overflow: hidden;
            }
            .tab-btn {
                padding: 16px 28px;
                border: none;
                background: none;
                font-size: 16px;
                font-weight: bold;
                color: #666;
                cursor: pointer;
                flex: 1;
            }
            .tab-btn.active {
                background: #e3f2fd;
                color: #1976d2;
            }
            .tab-btn:hover {
                background: #f5f5f5;
            }
            .content {
                position: static;
                padding-top: 0;
                max-width: 900px;
                margin: 0 auto;
                height: auto;
                min-height: 70vh;
            }
            iframe { height: 650px; }
            .home-content { color: #333; background: white; padding: 40px; border-radius: 12px; }
            .logo { width: 160px; }
            .home-title { font-size: 32px; }
        }
    </style>
</head>
<body>
    <!-- Menu Button -->
    <button class="menu-btn" id="menuToggle">☰</button>
    
    <!-- Mobile Menu -->
    <div class="menu" id="mobileMenu">
        <button class="menu-item active" data-target="home">الرئيسية</button>
        <button class="menu-item" data-target="search">بحث الأصناف</button>
        <button class="menu-item" data-target="prices">أسعار المبيعات</button>
        <button class="menu-item" data-target="sales">صندوق دبوس</button>
        <button class="menu-item" data-target="review">مراجعة الفواتير</button>
    </div>
    
    <!-- Content -->
    <div class="content" id="mainContent">
        <!-- Home -->
        <div id="home" class="tab-pane active">
            <div class="home-content">
                <img src="logo.png" alt="دبوس البسطة" class="logo">
                <h1 class="home-title">دبوس البسطة</h1>
                <p class="home-text">اضغط على ☰ لاختيار الصفحة<br>كل صفحة تملأ الشاشة كاملة</p>
            </div>
        </div>
        
        <!-- Pages -->
        <div id="search" class="tab-pane">
            <div class="loading">⏳ جاري التحميل...</div>
            <iframe src="https://dabbousbasta.github.io/Dabbous-Al-Basta/"></iframe>
        </div>
        <div id="prices" class="tab-pane">
            <div class="loading">⏳ جاري التحميل...</div>
            <iframe src="https://dabbousbasta.github.io/ITEM_PRICES/"></iframe>
        </div>
        <div id="sales" class="tab-pane">
            <div class="loading">⏳ جاري التحميل...</div>
            <iframe src="https://dabbousbasta.github.io/sales/"></iframe>
        </div>
        <div id="review" class="tab-pane">
            <div class="loading">⏳ جاري التحميل...</div>
            <iframe src="https://dabbousbasta.github.io/Prices/"></iframe>
        </div>
    </div>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const mobileMenu = document.getElementById('mobileMenu');
        const menuItems = mobileMenu.querySelectorAll('.menu-item');
        const tabPanes = document.querySelectorAll('.tab-pane');
        const mainContent = document.getElementById('mainContent');
        
        // Toggle menu
        menuToggle.addEventListener('click', function() {
            mobileMenu.classList.toggle('show');
        });
        
        // Close menu on outside click
        document.addEventListener('click', function(e) {
            if (!mobileMenu.contains(e.target) && !menuToggle.contains(e.target)) {
                mobileMenu.classList.remove('show');
            }
        });
        
        // Switch tabs
        menuItems.forEach(function(item) {
            item.addEventListener('click', function() {
                const targetId = this.dataset.target;
                
                // Update active states
                menuItems.forEach(i => i.classList.remove('active'));
                tabPanes.forEach(p => p.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(targetId).classList.add('active');
                
                // Show content
                mainContent.classList.add('show');
                
                // Handle iframe
                if (targetId !== 'home') {
                    const pane = document.getElementById(targetId);
                    const loading = pane.querySelector('.loading');
                    const iframe = pane.querySelector('iframe');
                    loading.style.display = 'block';
                    iframe.style.display = 'none';
                    setTimeout(function() {
                        loading.style.display = 'none';
                        iframe.style.display = 'block';
                    }, 500);
                }
                
                // Close menu
                mobileMenu.classList.remove('show');
            });
        });
    </script>
</body>
</html>
